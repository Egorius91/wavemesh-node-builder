name: Apply Auto-only implementation once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.head_ref == 'feature/auto-only-publication'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout work branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feature/auto-only-publication
          fetch-depth: 0

      - name: Apply implementation patch
        run: |
          set -Eeuo pipefail
          if [[ -f scripts/lib/route_presentation.py ]]; then
            echo 'Implementation already applied.'
            exit 0
          fi
          cat .github/auto-only.patch.part-*.patch > /tmp/auto-only.patch
          git apply --index --whitespace=error-all /tmp/auto-only.patch
          git diff --cached --check

      - name: Validate implementation
        if: hashFiles('scripts/lib/route_presentation.py') != ''
        run: |
          set -Eeuo pipefail
          python -m compileall -q scripts/lib tests/unit
          bash -n bin/wavemesh scripts/commands/subscription.sh
          for test_file in \
            tests/unit/test_route_presentation.py \
            tests/unit/test_auto_only_publication.py \
            tests/unit/test_subscription_renderer.py \
            tests/unit/test_native_subscription.py \
            tests/unit/test_runtime_state.py \
            tests/unit/test_e2e_auto.py \
            tests/unit/test_inbound_adapter.py \
            tests/unit/test_config_migration.py; do
            python "$test_file"
          done

      - name: Commit implementation
        run: |
          set -Eeuo pipefail
          if git diff --cached --quiet; then
            echo 'No implementation changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Add Auto-only subscription publication mode'
          git push origin HEAD:feature/auto-only-publication
