name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '43 3 * * 1'

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7740f2fb21add1d46278215acea47540db22f022 # v4.36.0
        with:
          languages: python
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@7740f2fb21add1d46278215acea47540db22f022 # v4.36.0
        with:
          category: '/language:python'
