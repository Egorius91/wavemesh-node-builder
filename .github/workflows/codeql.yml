name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '43 3 * * 1'

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@cf463419fdde78c727231e445622a9ac37966f84 # v4.36.0
        with:
          languages: python
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@cf463419fdde78c727231e445622a9ac37966f84 # v4.36.0
        with:
          category: '/language:python'
