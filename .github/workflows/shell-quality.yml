name: Shell quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify ShellCheck is available
        run: shellcheck --version

      - name: ShellCheck error-level findings
        run: |
          find bin scripts tests -type f -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=error

      - name: Patch hygiene
        run: git diff --check
