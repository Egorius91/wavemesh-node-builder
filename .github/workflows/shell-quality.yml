name: Shell quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify ShellCheck is available
        run: shellcheck --version

      - name: ShellCheck error-level findings
        run: |
          find bin scripts tests -type f -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=error

      - name: Patch hygiene
        run: git diff --check
