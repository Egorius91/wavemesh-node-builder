name: Shell quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify ShellCheck is available
        run: shellcheck --version

      - name: ShellCheck error-level findings
        run: |
          find bin scripts tests -type f -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=error

      - name: Patch hygiene
        run: git diff --check
